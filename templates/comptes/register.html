{% extends "base.html" %}

{% block title %}
Inscription
{% endblock %}

{% block content %}

<section class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow border-0 p-5">

                <h2 class="text-success mb-4">

                    Créer un compte

                </h2>

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button class="btn btn-success w-100">

                        S'inscrire

                    </button>

                </form>

            </div>

        </div>

    </div>

</section>

{% endblock %}
