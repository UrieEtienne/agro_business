{% load static %}

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO GLOBAL -->
    <title>{% block title %}Eden Agro Business{% endblock %}</title>

    <meta name="description"
          content="{% block meta_description %}Entreprise agricole professionnelle en Guinée spécialisée dans la production et distribution de produits agricoles.{% endblock %}">

    <meta name="keywords"
          content="{% block meta_keywords %}Agriculture, Guinée, Produits agricoles, Ferme, Agro Business{% endblock %}">

    <meta name="author" content="Eden Agro Business">

    <!-- OPEN GRAPH -->
    <meta property="og:title"
          content="{% block og_title %}Eden Agro Business{% endblock %}">

    <meta property="og:description"
          content="{% block og_description %}Entreprise agricole professionnelle en Guinée{% endblock %}">

    <meta property="og:type" content="website">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <!-- INSTALLER FONT AWESOME -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- css Bootstrap contact -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

    <!-- NAVBAR -->

    <header class="main-navbar">

        {% include 'partials/navbar.html' %}

    </header>

    <!-- CONTENU -->

    {% block content %}
    {% endblock %}
    <!-- FOOTER -->

    {% include 'partials/footer.html' %}

    <!-- WHATSAPP -->
     
    <a href="https://wa.me/224625481649"
        class="whatsapp-btn"
        target="_blank">
        <i class="bi bi-whatsapp"></i>
    </a>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="{% static 'js/main.js' %}"></script>

</body>

</html>
