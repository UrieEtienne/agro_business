<!DOCTYPE html>
<html>

<head>
    <title>Suivi livraison</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f6f8fb;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        .status {
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
            font-weight: bold;
            color: white;
        }

        .en_attente { background: #ffc107; color: black; }
        .en_preparation { background: #6c757d; }
        .expediee { background: #0d6efd; }
        .en_livraison { background: #198754; }
        .livree { background: #28a745; }
        .annulee { background: #dc3545; }

        #map {
            height: 400px !important;
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h2>📦 Suivi Livraison</h2>

<!-- INFO -->
<div class="box">

    <p><b>Ville :</b> {{ livraison.ville }}</p>
    <p><b>Adresse :</b> {{ livraison.adresse }}</p>

    <p>
        <b>Statut :</b>
        <span class="status {{ livraison.statut }}">
            {{ livraison.get_statut_display }}
        </span>
    </p>

</div>

<!-- MAP -->
<div class="box">
    <div id="map"></div>
</div>

<!-- Leaflet JS (IMPORTANT) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
var lat = JSON.parse(document.getElementById("lat-data").textContent);
var lng = JSON.parse(document.getElementById("lng-data").textContent);

var map = L.map('map').setView([lat, lng], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

L.marker([lat, lng])
.addTo(map)
.bindPopup("📦 Livraison ici")
.openPopup();
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {

    var lat = parseFloat("{{ livraison.latitude|default:'9.6412' }}");
    var lng = parseFloat("{{ livraison.longitude|default:'-13.5784' }}");

    var map = L.map('map').setView([lat, lng], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    L.marker([lat, lng])
    .addTo(map)
    .bindPopup("📦 Livraison ici")
    .openPopup();

});
</script>

</body>
</html>
