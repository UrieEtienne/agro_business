<!DOCTYPE html>
<html>

<head>
    <title>Suivi livraison</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f6f8fb;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        .status {
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
            font-weight: bold;
        }

        .en_attente { background: #ffc107; color: black; }
        .en_cours { background: #0d6efd; color: white; }
        .livree { background: #198754; color: white; }

        #map {
            height: 400px;
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h2>📦 Suivi Livraison</h2>

<!-- INFO -->
<div class="box">

    <p><b>Quartier :</b> {{ livraison.quartier }}</p>

    <p>
        <b>Statut :</b>
        <span class="status {{ livraison.statut }}">
            {{ livraison.statut }}
        </span>
    </p>

</div>

<!-- MAP -->
<div class="box">

    <div id="map"></div>

</div>

<script>
function initMap() {

    const position = {
        lat: parseFloat("{{ livraison.latitude|default:9.6412 }}"),
        lng: parseFloat("{{ livraison.longitude|default:-13.5784 }}")
    };

    const map = new google.maps.Map(document.getElementById("map"), {
        zoom: 13,
        center: position
    });

    new google.maps.Marker({
        position: position,
        map: map
    });
}
</script>

<!-- ⚠️ AJOUTER TA VRAIE CLE API ICI -->
<script src="https://maps.googleapis.com/maps/api/js?key=TA_CLE_API&callback=initMap" async defer></script>
<div id="map" style="height:400px;"></div>

<script>
var map = L.map('map').setView([9.6412, -13.5784], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

L.marker([9.6412, -13.5784]).addTo(map)
    .bindPopup('Livraison ici')
    .openPopup();
</script>

</body>
</html>
