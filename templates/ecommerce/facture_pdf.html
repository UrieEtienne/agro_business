<!DOCTYPE html>
<html>

<head>

    <style>

        body{
            font-family: Arial;
        }

        .header{
            text-align:center;
            margin-bottom:40px;
        }

        .logo{
            width:120px;
        }

        .title{
            font-size:28px;
            color:#198754;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:30px;
        }

        table, th, td{
            border:1px solid #ddd;
        }

        th{
            background:#198754;
            color:white;
        }

        th, td{
            padding:12px;
            text-align:left;
        }

        .total{
            text-align:right;
            margin-top:30px;
            font-size:20px;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <div class="header">

        <img src="static/images/logo.png"
             class="logo">

        <h1 class="title">

            FACTURE CLIENT

        </h1>

    </div>

    <p>
        <strong>Facture :</strong>
        {{ facture.numero }}
    </p>

    <p>
        <strong>Client :</strong>
        {{ facture.client_nom }}
    </p>

    <p>
        <strong>Email :</strong>
        {{ facture.client_email }}
    </p>

    <table>

        <thead>

            <tr>

                <th>Produit</th>

                <th>Qté</th>

                <th>Prix</th>

                <th>Total</th>

            </tr>

        </thead>

        <tbody>

            <tr>

                <td>{{ facture.produit }}</td>

                <td>{{ facture.quantite }}</td>

                <td>{{ facture.prix_unitaire }}</td>

                <td>{{ facture.total }}</td>

            </tr>

        </tbody>

    </table>

    <div class="total">

        TVA : {{ facture.tva }} % <br>
        TOTAL : {{ facture.total }} GNF

    </div>

</body>

</html>
